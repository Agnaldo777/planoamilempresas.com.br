issues:
  critical: []
  high: []
  medium:
    - id: MED-1
      title: "Línea 237 (continue em prestador sem bairro) é dead code com dataset atual"
      description: |
        Dataset 2026-04-26 tem 0/9325 prestadores sem bairro (verified via node script).
        Branch defensive `if (prestador.bairro.length === 0) continue;` no buildCache
        nunca executa em produção. Coverage bypassa.
      recommendation: |
        Adicionar test com vi.mock('@/data/operadoras/amil/rede-credenciada.json')
        injetando fixture com prestador sem bairro. Cobre a branch + protege contra
        regressão se Story 7.10 (pipeline mensal) introduzir prestador incompleto.
      severity_action: "Tech debt — pode ser absorvido em Story 7.2 ou ficar em backlog"
      blocks_merge: false
    - id: MED-2
      title: "buildCache itera prestadores 5× com keys redundantes"
      description: |
        municipiosMap e byMunicipioSlug processam mesma key (`ufSlug|cidadeSlug`)
        mas em loops separados. byUf/byBairroSlug/byPrestadorSlug iteram prestadores
        adicionalmente.
      recommendation: |
        Refatorar para fold único iteration. Ganho marginal em build SSG (~10ms)
        mas DRY enforced. Story 7.2 ou 7.4 podem refatorar quando consumirem.
      severity_action: "Tech debt — performance optimization opportunity"
      blocks_merge: false
  low:
    - id: LOW-1
      title: "Sort estabilidade não testada explicitamente em getMunicipios()"
      recommendation: "Adicionar test que valida ordem de municípios com mesmo totalPrestadores em chamadas múltiplas"
      blocks_merge: false
    - id: LOW-2
      title: "__resetCacheForTests exposto em prod"
      recommendation: "Considerar separação em src/test/helpers.ts ou guard via process.env.NODE_ENV"
      blocks_merge: false
    - id: LOW-3
      title: "getEstatisticasByUF('SP') test não valida count exato vs dataset"
      recommendation: "Adicionar assertion expect(...totalPrestadores).toBe(SP_COUNT_REAL) para reforçar dataset invariant"
      blocks_merge: false
    - id: LOW-4
      title: "byPrestadorSlug collision rara não tem fixture defensive"
      recommendation: "Adicionar console.warn ou dedup quando 2 prestadores colidem em codigo+nome+bairro slug"
      blocks_merge: false

