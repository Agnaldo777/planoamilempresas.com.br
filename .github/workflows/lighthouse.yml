name: lighthouse

on:
  pull_request:
    branches: [main]

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lhci:
    name: lhci
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Wait for Vercel preview deployment
        id: vercel-preview
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 600
          check_interval: 15
          environment: Preview

      - name: Run Lighthouse CI
        # TODO: npm i -D @lhci/cli (alternativa: usar action diretamente sem instalar)
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ steps.vercel-preview.outputs.url }}
            ${{ steps.vercel-preview.outputs.url }}/empresarial
            ${{ steps.vercel-preview.outputs.url }}/planos
            ${{ steps.vercel-preview.outputs.url }}/rede-credenciada
            ${{ steps.vercel-preview.outputs.url }}/cotacao-online
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 1

      - name: Comment Lighthouse summary on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.vercel-preview.outputs.url }}';
            const status = '${{ job.status }}';
            const body = `### Lighthouse CI — ${status === 'success' ? '✅ pass' : '❌ fail'}\n\n` +
              `Preview URL: ${url}\n\n` +
              `Thresholds (de \`.lighthouserc.json\`):\n` +
              `- Performance ≥ 90 (NFR1 alvo ≥ 92)\n` +
              `- Accessibility ≥ 95\n` +
              `- Best Practices ≥ 90\n` +
              `- SEO ≥ 95\n`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
