name: validate-sitemap-routing

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate sitemap × routing consistency (NFR26)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache .next build
        uses: actions/cache@v4
        with:
          path: .next
          key: ${{ runner.os }}-nextbuild-${{ hashFiles('**/package-lock.json', 'app/**', 'lib/**') }}
          restore-keys: |
            ${{ runner.os }}-nextbuild-

      - name: Run sitemap × routing validator
        id: validator
        run: node scripts/validate-sitemap-routing.mjs --verbose

      - name: Comment PR on failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            let output = '';
            try {
              output = execSync('node scripts/validate-sitemap-routing.mjs', { encoding: 'utf8' });
            } catch (e) {
              output = e.stdout || e.message;
            }
            const cleaned = output.replace(/\[[0-9;]*m/g, '');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '### Sitemap × Routing Validation Failed (NFR26)\n\n```\n' + cleaned + '\n```'
            });
