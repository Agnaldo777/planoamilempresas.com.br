name: accessibility

on:
  pull_request:
    branches: [main]

concurrency:
  group: a11y-${{ github.ref }}
  cancel-in-progress: true

jobs:
  axe:
    name: axe
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for Vercel preview deployment
        id: vercel-preview
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 600
          check_interval: 15
          environment: Preview

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # TODO: npm i -D @axe-core/cli (alternativa: instalar globalmente no job)
      - name: Install axe-core CLI
        run: npm install -g @axe-core/cli@4

      - name: Run axe-core against preview pages (WCAG AA)
        id: axe
        run: |
          set -eo pipefail
          BASE="${{ steps.vercel-preview.outputs.url }}"
          URLS=(
            "$BASE"
            "$BASE/empresarial"
            "$BASE/planos"
            "$BASE/rede-credenciada"
            "$BASE/cotacao-online"
            "$BASE/perguntas-frequentes"
          )
          FAIL=0
          for url in "${URLS[@]}"; do
            echo "::group::axe $url"
            axe "$url" \
              --tags wcag2a,wcag2aa,wcag21a,wcag21aa,best-practice \
              --exit \
              --timeout 90000 \
              --no-sandbox || FAIL=1
            echo "::endgroup::"
          done
          exit $FAIL

      - name: Comment a11y summary on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}';
            const url = '${{ steps.vercel-preview.outputs.url }}';
            const body = `### Accessibility (axe-core) — ${status === 'success' ? '✅ 0 WCAG AA violations' : '❌ violations found'}\n\n` +
              `Preview URL: ${url}\n\n` +
              `Thresholds: WCAG 2.1 A + AA + best-practice. Zero tolerance.\n` +
              `Run logs: see workflow output.\n`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
