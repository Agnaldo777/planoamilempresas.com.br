name: editorial-cadence

# Story 6.11.e — AC2: alerta automático quando blog fica sem post
# novo por mais de 14 dias (warning) ou 30 dias (crítico, abre issue
# escalada para @pm). Roda mensalmente + on-demand.

on:
  schedule:
    # Dia 1 de cada mês 09:00 UTC (06:00 BRT)
    - cron: '0 9 1 * *'
  workflow_dispatch:
    inputs:
      threshold_warning_days:
        description: 'Dias sem post para warning (default 14)'
        required: false
        default: '14'
      threshold_critical_days:
        description: 'Dias sem post para crítico (default 30)'
        required: false
        default: '30'

concurrency:
  group: editorial-cadence
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  check-cadence:
    name: Check editorial cadence
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Compute days since last post
        id: cadence
        env:
          # SANITY token read-only — opcional. Se ausente, fallback
          # para mock-posts.ts (preview/dev).
          SANITY_API_READ_TOKEN: ${{ secrets.SANITY_API_READ_TOKEN }}
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          THRESHOLD_WARN: ${{ inputs.threshold_warning_days || '14' }}
          THRESHOLD_CRIT: ${{ inputs.threshold_critical_days || '30' }}
        run: node scripts/check-editorial-cadence.mjs

      - name: Open or update warning issue
        if: steps.cadence.outputs.severity == 'warning'
        uses: actions/github-script@v7
        with:
          script: |
            const days = '${{ steps.cadence.outputs.days_since }}';
            const lastTitle = '${{ steps.cadence.outputs.last_title }}';
            const lastDate = '${{ steps.cadence.outputs.last_date }}';
            const title = `[Editorial Cadence] Cadência atrasada — sem post há ${days} dias`;
            const body = [
              `## Cadência editorial em alerta`,
              ``,
              `- Último post: **${lastTitle}**`,
              `- Publicado em: \`${lastDate}\``,
              `- Dias sem novo post: \`${days}\``,
              ``,
              `Threshold warning: 14 dias. Crítico: 30 dias.`,
              `Roadmap: docs/editorial/blog-roadmap.md`,
              ``,
              `_Generated by editorial-cadence.yml_`,
            ].join('\n');
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'editorial-cadence-warning',
            });
            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['editorial-cadence-warning', 'seo', 'blog'],
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: `Update — agora ${days} dias sem post (${lastDate}).`,
              });
            }

      - name: Escalate critical issue
        if: steps.cadence.outputs.severity == 'critical'
        uses: actions/github-script@v7
        with:
          script: |
            const days = '${{ steps.cadence.outputs.days_since }}';
            const lastTitle = '${{ steps.cadence.outputs.last_title }}';
            const lastDate = '${{ steps.cadence.outputs.last_date }}';
            const title = `[CRITICAL] Cadência editorial rompida — sem post há ${days} dias`;
            const body = [
              `## CADÊNCIA EDITORIAL ROMPIDA`,
              ``,
              `Sem post novo há **${days} dias** (threshold crítico: 30).`,
              `Último post: **${lastTitle}** publicado em \`${lastDate}\`.`,
              ``,
              `Risco: anti-padrão amilplanos.com.br (blog parado → perda de`,
              `freshness signals SEO). Ação obrigatória da PM:`,
              `- Avaliar capacidade redação @analyst (Atlas)`,
              `- Revisar roadmap docs/editorial/blog-roadmap.md`,
              `- Decidir: produzir 2 posts curtos ou 1 longo até fim do mês`,
              ``,
              `cc: @pm`,
              `_Generated by editorial-cadence.yml — escalado automaticamente_`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['editorial-cadence-critical', 'priority-high', 'blog'],
            });

      - name: Append cadence history
        if: always()
        env:
          MONTH: ${{ steps.cadence.outputs.month_label }}
          DAYS: ${{ steps.cadence.outputs.days_since }}
          POSTS_LAST_MONTH: ${{ steps.cadence.outputs.posts_last_month }}
          SEVERITY: ${{ steps.cadence.outputs.severity }}
        run: node scripts/check-editorial-cadence.mjs --append-history
